name: Enterprise Electron Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write
    actions: write
    packages: write

jobs:
    # =========================================================
    # 1️⃣ BUILD MATRIX
    # =========================================================
    build:
        name: Build (${{ matrix.os }})
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: true
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "24.2.0"

            - name: Install Linux tools
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential
                  sudo snap install snapcraft --classic

            - name: Install dependencies
              run: npm install --no-audit --force

            - name: Install native deps
              run: npx electron-builder install-app-deps

            - name: Build React
              run: npm run build:react

            - name: Build Electron
              run: |
                  if [ "${{ runner.os }}" == "Linux" ]; then
                    sudo npm run build:electron -- --linux --publish never
                  elif [ "${{ runner.os }}" == "macOS" ]; then
                    sudo npm run build:electron -- --mac --publish never
                  elif [ "${{ runner.os }}" == "Windows" ]; then
                    npm run build:electron -- --win --publish never
                  fi
              shell: bash

            # - name: Remove unwanted files
            #   shell: bash
            #   run: |
            #       shopt -s nullglob
            #       for file in dist/*; do
            #         case "$file" in
            #           *.blockmap|*.yml|builder-debug.yml) rm -f "$file" ;;
            #         esac
            #       done
            #
            # - name: Fix permissions safely
            #   shell: bash
            #   run: |
            #       sudo chown -R $(id -u):$(id -g) dist
            #       chmod -R u+rwX dist

            # - name: Generate SHA256 checksums
            #   shell: bash
            #   run: |
            #       cd dist
            #       find . -maxdepth 1 -type f -exec sha256sum {} \; > SHA256SUMS.txt

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: build-${{ matrix.os }}
                  path: dist/*
                  if-no-files-found: error

    # =========================================================
    # 2️⃣ RELEASE JOB
    # =========================================================
    release:
      name: Publish GitHub Release
      runs-on: ubuntu-latest
      needs: build
      if: startsWith(github.ref, 'refs/tags/')

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Download all artifacts
          uses: actions/download-artifact@v4
          with:
            path: release-files

        - name: Collect distributable build files
          run: |
              mkdir -p final
              shopt -s globstar nullglob

              for file in release-files/**/*; do
                [ -f "$file" ] || continue

                case "$file" in
                  *.exe|*.msi|*.deb|*.rpm|*.AppImage|*.dmg|*.zip|*.tar.gz)

                    filename="$(basename "$file")"

                        # Exclude specific unwanted executables
                    if [[ "$filename" == "esbuild.exe" || "$filename" == "elevate.exe" ]]; then
                        echo "Skipping $filename"
                        continue
                    fi

                    echo "Adding $filename"
                    mv "$file" final/
                    ;;
                esac
              done

              echo "=== Final release files ==="
              ls -la final

        - name: Determine prerelease
          id: prerelease
          run: |
              if [[ "${{ github.ref_name }}" == *"-"* ]]; then
                echo "is_prerelease=true" >> $GITHUB_OUTPUT
              else
                echo "is_prerelease=false" >> $GITHUB_OUTPUT
              fi

        - name: Create Draft Release
          run: |
              gh release create "${{ github.ref_name }}" \
                --title "${{ github.ref_name }}" \
                --generate-notes \
                --draft \
                $([[ "${{ steps.prerelease.outputs.is_prerelease }}" == "true" ]] && echo "--prerelease")
          env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name: Upload all release assets
          run: |
              shopt -s nullglob
              files=(final/*)

              if [ ${#files[@]} -eq 0 ]; then
                echo "No files found to upload!"
                exit 1
              fi

              for file in "${files[@]}"; do
                echo "Uploading $(basename "$file")"
                gh release upload "${{ github.ref_name }}" "$file" --clobber
              done
          env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name: Publish Release
          run: |
              gh release edit "${{ github.ref_name }}" --draft=false
          env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
