name: Update Changelog from PR
on:
  pull_request_target:
    types: [closed]
jobs:
  changelog:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
      - id: pr-chg
        uses: DiceTechnology/pr-changelog-action@v1.0.8
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          destination_branch: main
      - name: Update CHANGELOG.md
        run: |
          # Append ${{ steps.pr-chg.outputs.changelog }} to CHANGELOG.md under Unreleased
          echo "${{ steps.pr-chg.outputs.changelog }}" >> CHANGELOG.md
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update changelog from PR #${{ github.event.pull_request.number }}"
          file_pattern: CHANGELOG.md
